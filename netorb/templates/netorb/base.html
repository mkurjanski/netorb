<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}netorb{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #0d1117; color: #c9d1d9; font-family: monospace; font-size: 13px; }

    header {
      display: flex; align-items: center; gap: 1rem;
      padding: .75rem 1.25rem; background: #161b22; border-bottom: 1px solid #30363d;
    }
    header h1 { font-size: 1rem; font-weight: 600; }

    nav {
      display: flex; gap: .5rem;
      padding: .5rem 1.25rem; background: #161b22; border-bottom: 1px solid #30363d;
    }
    nav a {
      color: #58a6ff; text-decoration: none;
      padding: .2rem .6rem; border-radius: 4px;
    }
    nav a:hover { background: #21262d; }
    nav a.active { color: #c9d1d9; background: #21262d; }

    main { padding: 1.5rem 1.25rem; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

<header>
  <h1>netorb</h1>
</header>

<nav>
  <a href="/" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a>
  <a href="/interfaces/" {% if request.resolver_match.url_name == 'interfaces' %}class="active"{% endif %}>Interfaces</a>
  <a href="/routes/" {% if request.resolver_match.url_name == 'routes' %}class="active"{% endif %}>Routes</a>
  <a href="/logs/" {% if request.resolver_match.url_name == 'log-page' %}class="active"{% endif %}>Logs</a>
  <a href="/poll-results/" {% if request.resolver_match.url_name == 'poll-results' %}class="active"{% endif %}>Poll Results</a>
  <a href="/tasks/" {% if request.resolver_match.url_name == 'tasks' %}class="active"{% endif %}>Tasks</a>
  <a href="/admin/">Admin</a>
</nav>

{% block content %}{% endblock %}

{% block extra_scripts %}{% endblock %}

</body>
</html>
